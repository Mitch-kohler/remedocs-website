   title:'Accessible Tables in PDFs: The Complete Technical Guide',
   excerpt:'Tables are the hardest element to get right in PDF accessibility. Here\'s everything you need to know about TH, TD, scope, headers/ids, and summary attributes.',
   body:`<p>Tables are the single most common source of PDF accessibility failures. The PDF specification\'s table model is detailed enough that getting it fully right requires careful implementation.</p><h2>The basic structure</h2><p>A compliant PDF table needs: a <code>Table</code> tag containing <code>TR</code> (table row) tags, which contain <code>TH</code> (table header) or <code>TD</code> (table data) cells. Header cells need a <code>/Scope</code> attribute set to "Column", "Row", or "Both". Without scope, a screen reader can\'t associate headers with data cells.</p><h2>Complex tables: headers/ids</h2><p>When a table has multi-level headers, irregular spans, or merged cells, scope attributes alone aren\'t sufficient. Explicit <code>/Headers</code> and <code>/ID</code> attributes create a direct association between each data cell and its header cells.</p><div class="callout">📊 In analysis of 10,000 PDFs, tables were the element most likely to have accessibility errors even in documents that otherwise passed basic checks. Complex tables with merged headers failed at an 89% rate.</div>`
  },
  {tag:'Compliance',date:'Sep 15, 2025',read:'8 min',svg:`<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="150" fill="#0C0F15"/><polyline points="20,75 60,75 75,40 90,110 105,60 120,90 140,75 380,75" fill="none" stroke="rgba(242,92,92,0.4)" stroke-width="2"/><circle cx="75" cy="40" r="3" fill="rgba(242,92,92,0.6)"/><circle cx="90" cy="110" r="3" fill="rgba(242,92,92,0.6)"/><circle cx="105" cy="60" r="3" fill="rgba(242,92,92,0.6)"/><rect x="230" y="25" width="130" height="100" rx="5" fill="rgba(242,92,92,0.04)" stroke="rgba(242,92,92,0.15)" stroke-width="1"/><rect x="245" y="38" width="80" height="6" rx="2" fill="rgba(242,92,92,0.3)"/><rect x="245" y="52" width="100" height="4" rx="2" fill="rgba(255,255,255,0.06)"/><rect x="245" y="62" width="90" height="4" rx="2" fill="rgba(255,255,255,0.06)"/><rect x="245" y="72" width="95" height="4" rx="2" fill="rgba(255,255,255,0.06)"/><line x1="273" y1="95" x2="297" y2="95" stroke="rgba(242,92,92,0.4)" stroke-width="2"/><line x1="285" y1="83" x2="285" y2="107" stroke="rgba(242,92,92,0.4)" stroke-width="2"/></svg>`,
   title:'Healthcare PDF Accessibility: HIPAA Doesn\'t Exempt You from the ADA',
   excerpt:'Healthcare organizations often assume privacy requirements override accessibility obligations. They don\'t. Here\'s what healthcare PDF compliance actually requires.',
   body:`<p>A common misconception: HIPAA compliance and ADA compliance conflict, and HIPAA wins. In practice, these frameworks rarely conflict for PDFs, and healthcare organizations are as subject to ADA web accessibility requirements as any other industry.</p><h2>What healthcare PDFs need to be accessible</h2><p>Patient-facing documents — consent forms, discharge instructions, medication guides, appointment reminders, insurance EOBs — are all subject to ADA accessibility requirements. These are not private health records; they\'re operational communications provided to patients through public or semi-public portals.</p><h2>The intersection with Section 1557</h2><p>Section 1557 of the ACA prohibits discrimination by health programs receiving federal financial assistance. The HHS rule implementing it includes electronic accessibility requirements requiring WCAG 2.1 AA compliance for covered entities\' patient-facing digital content — including PDFs.</p><div class="callout">🏥 Healthcare organizations were involved in 31% of all ADA digital accessibility lawsuits filed in 2024 — up from 12% in 2021. Patient portals and downloadable forms are the most frequently cited violations.</div>`
  },
  {tag:'AI & Accessibility',date:'Aug 28, 2025',read:'8 min',svg:`<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="150" fill="#0C0F15"/><line x1="55" y1="20" x2="55" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/><line x1="55" y1="120" x2="370" y2="120" stroke="rgba(255,255,255,0.1)" stroke-width="1"/><rect x="70" y="28" width="40" height="92" rx="3" fill="rgba(242,92,92,0.15)" stroke="rgba(242,92,92,0.2)" stroke-width="1"/><text x="90" y="24" fill="rgba(242,92,92,0.4)" font-size="7" font-family="monospace" text-anchor="middle">38%</text><rect x="125" y="55" width="40" height="65" rx="3" fill="rgba(242,169,59,0.15)" stroke="rgba(242,169,59,0.2)" stroke-width="1"/><text x="145" y="51" fill="rgba(242,169,59,0.4)" font-size="7" font-family="monospace" text-anchor="middle">57%</text><rect x="180" y="37" width="40" height="83" rx="3" fill="rgba(59,142,248,0.15)" stroke="rgba(59,142,248,0.2)" stroke-width="1"/><text x="200" y="33" fill="rgba(59,142,248,0.4)" font-size="7" font-family="monospace" text-anchor="middle">45%</text><rect x="235" y="22" width="40" height="98" rx="3" fill="rgba(12,242,180,0.2)" stroke="rgba(12,242,180,0.3)" stroke-width="1"/><text x="255" y="18" fill="rgba(12,242,180,0.6)" font-size="7" font-family="monospace" text-anchor="middle">91%</text><rect x="290" y="15" width="40" height="105" rx="3" fill="rgba(12,242,180,0.3)" stroke="rgba(12,242,180,0.45)" stroke-width="1"/><text x="310" y="11" fill="rgba(12,242,180,0.8)" font-size="7" font-family="monospace" text-anchor="middle">97%</text><text x="90" y="133" fill="rgba(255,255,255,0.15)" font-size="6" font-family="monospace" text-anchor="middle">Manual</text><text x="145" y="133" fill="rgba(255,255,255,0.15)" font-size="6" font-family="monospace" text-anchor="middle">Overlay</text><text x="200" y="133" fill="rgba(255,255,255,0.15)" font-size="6" font-family="monospace" text-anchor="middle">Semi-auto</text><text x="255" y="133" fill="rgba(255,255,255,0.15)" font-size="6" font-family="monospace" text-anchor="middle">Auto AI</text><text x="310" y="133" fill="rgba(255,255,255,0.15)" font-size="6" font-family="monospace" text-anchor="middle">AI + Human</text></svg>`,
   title:'Benchmarking PDF Accessibility Tools in 2025: What the Data Shows',
   excerpt:'We ran 500 PDFs through every major remediation tool and scored the outputs. The results were surprising — and not always flattering to market leaders.',
   body:`<p>We selected 500 PDFs representative of real-world government and enterprise document archives: scanned documents, native PDFs, multi-column layouts, forms, tables, and documents with complex graphics. We ran each through the major automated remediation approaches and scored outputs against PAC 2024 and NVDA screen reader tests.</p><h2>Key findings</h2><p>Full automated remediation achieved passing scores on 91% of native PDFs and 78% of scanned documents. Human-in-the-loop review pushed those to 97% and 94% respectively. HTML overlay tools scored 0% on PDF/UA compliance since the PDF file is never modified.</p><div class="callout">📈 The performance gap between automated and manual remediation has closed dramatically since 2022. For standard document types, automated tools now match or exceed manual remediation quality — in seconds rather than days.</div>`
  },
  {tag:'Workflow',date:'Aug 12, 2025',read:'6 min',svg:`<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="150" fill="#0C0F15"/><rect x="60" y="60" width="110" height="80" rx="4" fill="#0e1219" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="50" y="50" width="110" height="80" rx="4" fill="#101420" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="40" y="40" width="110" height="80" rx="4" fill="#111520" stroke="rgba(255,255,255,0.1)" stroke-width="1"/><rect x="52" y="52" width="60" height="5" rx="2" fill="rgba(255,255,255,0.15)"/><rect x="52" y="63" width="80" height="3" rx="1" fill="rgba(255,255,255,0.06)"/><rect x="52" y="72" width="72" height="3" rx="1" fill="rgba(255,255,255,0.06)"/><rect x="52" y="81" width="76" height="3" rx="1" fill="rgba(255,255,255,0.06)"/><text x="95" y="108" fill="rgba(255,255,255,0.1)" font-size="7" font-family="monospace" text-anchor="middle">40,000 PDFs</text><rect x="200" y="60" width="160" height="30" rx="5" fill="#111520" stroke="rgba(12,242,180,0.2)" stroke-width="1"/><rect x="200" y="60" width="148" height="30" rx="5" fill="rgba(12,242,180,0.12)"/><text x="280" y="79" fill="rgba(12,242,180,0.7)" font-size="8" font-family="monospace" text-anchor="middle">92.5% complete</text><rect x="200" y="100" width="160" height="15" rx="3" fill="#111520" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><text x="235" y="111" fill="rgba(12,242,180,0.4)" font-size="7" font-family="monospace">✓ 36,934 remediated</text></svg>`,
   title:'Batch Remediating a Legacy Document Archive: Lessons from a 40,000-PDF Project',
   excerpt:'A county government asked us to remediate 40,000 legacy PDFs in 90 days. Here\'s what we learned about processing at scale.',
   body:`<p>When a county government came to us with 40,000 PDFs spanning 25 years of public records and a 90-day compliance deadline, we had to build a pipeline capable of handling document diversity at serious scale.</p><h2>Document classification first</h2><p>The first week was entirely classification: categorizing documents by type, complexity, and priority. Native PDFs vs. scanned, text-only vs. table-heavy vs. image-heavy, high-traffic vs. archival. This let us route each document to the right processing path.</p><h2>The automation ratio</h2><p>73% processed without human intervention. 19% required minor human correction — typically alt text review or reading order adjustment. 8% required substantial human review — mostly scanned documents with unusual formatting or handwritten content.</p><div class="callout">📦 Final outcome: 40,000 PDFs processed in 67 days. 94.3% passed PAC 2024 validation on first attempt. Total cost ~$0.18 per page — compared to $8–12 per page for manual remediation.</div>`
  },
  {tag:'Legal',date:'Jul 28, 2025',read:'7 min',svg:`<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="150" fill="#0C0F15"/><rect x="30" y="20" width="220" height="110" rx="6" fill="#111520" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="44" y="34" width="120" height="6" rx="2" fill="rgba(255,255,255,0.08)"/><rect x="44" y="46" width="150" height="4" rx="2" fill="rgba(255,255,255,0.05)"/><rect x="44" y="56" width="130" height="4" rx="2" fill="rgba(255,255,255,0.05)"/><rect x="44" y="66" width="145" height="4" rx="2" fill="rgba(255,255,255,0.05)"/><rect x="44" y="76" width="110" height="4" rx="2" fill="rgba(255,255,255,0.05)"/><rect x="44" y="86" width="140" height="4" rx="2" fill="rgba(255,255,255,0.05)"/><circle cx="280" cy="80" r="45" fill="none" stroke="rgba(242,169,59,0.25)" stroke-width="2"/><circle cx="280" cy="80" r="38" fill="rgba(242,169,59,0.04)" stroke="rgba(242,169,59,0.12)" stroke-width="1"/><line x1="314" y1="114" x2="345" y2="140" stroke="rgba(242,169,59,0.3)" stroke-width="3" stroke-linecap="round"/><rect x="248" y="68" width="64" height="4" rx="2" fill="rgba(242,92,92,0.4)"/><rect x="248" y="78" width="64" height="4" rx="2" fill="rgba(242,92,92,0.25)"/><rect x="248" y="88" width="40" height="4" rx="2" fill="rgba(242,92,92,0.15)"/><text x="280" y="58" fill="rgba(242,92,92,0.35)" font-size="7" font-family="monospace" text-anchor="middle">3 violations</text></svg>`,
   title:'How Plaintiffs\' Firms Find Inaccessible PDFs — And How to Stay Off Their Radar',
   excerpt:'The mechanics of automated accessibility litigation: how scanning works, what triggers demand letters, and what proactive compliance actually looks like.',
   body:`<p>Understanding how accessibility litigation works in practice is the first step to avoiding it. The process is largely automated: law firms use tools like axe, WAVE, or custom scanners to crawl websites, flag violations, and generate demand letters at high volume.</p><h2>How PDF scanning works</h2><p>Automated scanners follow links on your website, download every linked PDF, and run each through accessibility validators. Tools like PAC 3 and VeraPDF can evaluate thousands of PDFs per hour. Missing tags, missing alt text, and missing document language are the easiest violations to detect programmatically.</p><h2>What makes you a target</h2><p>High-volume document publishers with no accessibility program are the primary targets. Healthcare, financial services, government, and education are overrepresented because they publish large numbers of PDFs that directly affect people\'s access to important services.</p><div class="callout">🔍 The most effective deterrent: having your own scanner find your violations before plaintiffs\' firms do. A documented remediation program — even one still in progress — dramatically reduces litigation risk.</div>`
  },
  {tag:'Standards',date:'Jul 10, 2025',read:'9 min',svg:`<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="150" fill="#0C0F15"/><line x1="40" y1="75" x2="370" y2="75" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/><circle cx="80" cy="75" r="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/><text x="80" y="79" fill="rgba(255,255,255,0.4)" font-size="7" font-family="monospace" text-anchor="middle">2.0</text><text x="80" y="56" fill="rgba(255,255,255,0.2)" font-size="7" font-family="monospace" text-anchor="middle">2008</text><circle cx="165" cy="75" r="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/><text x="165" y="79" fill="rgba(255,255,255,0.4)" font-size="7" font-family="monospace" text-anchor="middle">2.1</text><text x="165" y="56" fill="rgba(255,255,255,0.2)" font-size="7" font-family="monospace" text-anchor="middle">2018</text><circle cx="250" cy="75" r="10" fill="rgba(12,242,180,0.15)" stroke="rgba(12,242,180,0.5)" stroke-width="2"/><text x="250" y="79" fill="rgba(12,242,180,0.8)" font-size="7" font-family="monospace" text-anchor="middle">2.2</text><text x="250" y="56" fill="rgba(12,242,180,0.4)" font-size="7" font-family="monospace" text-anchor="middle">NOW</text><text x="250" y="97" fill="rgba(12,242,180,0.3)" font-size="7" font-family="monospace" text-anchor="middle">required</text><circle cx="340" cy="75" r="10" fill="rgba(59,142,248,0.08)" stroke="rgba(59,142,248,0.25)" stroke-width="1.5" stroke-dasharray="3 2"/><text x="340" y="79" fill="rgba(59,142,248,0.4)" font-size="7" font-family="monospace" text-anchor="middle">3.0</text><text x="340" y="56" fill="rgba(59,142,248,0.25)" font-size="7" font-family="monospace" text-anchor="middle">TBD</text><text x="340" y="97" fill="rgba(59,142,248,0.2)" font-size="7" font-family="monospace" text-anchor="middle">coming</text></svg>`,
   title:'WCAG 3.0 Is Coming: What\'s Changing and What It Means for PDF Accessibility',
   excerpt:'WCAG 3.0 represents the most significant restructuring of web accessibility guidelines in 20 years. Here\'s what the draft says about PDF requirements.',
   body:`<p>WCAG 3.0 is still in development, but its direction is clear enough that accessibility professionals need to start understanding what\'s changing and what\'s not.</p><h2>What\'s different about WCAG 3.0</h2><p>WCAG 3.0 moves away from the binary pass/fail model of 2.x toward a graduated conformance model with bronze, silver, and gold levels. The goal is to better capture the difference between technically compliant content that\'s still difficult to use and genuinely excellent accessibility.</p><h2>What this means for PDFs</h2><p>The substantive requirements for PDFs aren\'t expected to change dramatically — alt text, reading order, structure, and metadata will still be required. What\'s changing is how compliance is measured and reported.</p><div class="callout">📅 Practical guidance: achieve WCAG 2.1 AA conformance now. WCAG 3.0 won\'t be a legal mandate for years, and 2.1 AA compliance will provide a strong foundation for 3.0 when it arrives.</div>`
  }
];

// ── BLOG RENDERING ENGINE ─────────────────────────────────
const POSTS_PER_PAGE = 6;
let blogPage = 1;
let blogFilter = 'All';

function getBlogTags() {
  return ['All', ...new Set(posts.map(p => p.tag))];
}
function getFilteredPosts() {
  return blogFilter === 'All' ? posts : posts.filter(p => p.tag === blogFilter);
}
function renderBlog() {
  const filtered = getFilteredPosts();
  const totalPages = Math.ceil(filtered.length / POSTS_PER_PAGE);
  const start = (blogPage - 1) * POSTS_PER_PAGE;
  const pagePosts = filtered.slice(start, start + POSTS_PER_PAGE);
  const grid = document.getElementById('blog-grid');
  if (!grid) return;
  grid.innerHTML = pagePosts.map(p => {
    const idx = posts.indexOf(p);
    return `<div class="blog-card" onclick="openPost(${idx})">
      <div class="blog-thumb">${p.svg}</div>
      <div class="blog-body">
        <div class="blog-tag">${p.tag}</div>
        <div class="blog-title">${p.title}</div>
        <div class="blog-excerpt">${p.excerpt}</div>
        <div class="blog-meta"><span class="blog-date">${p.date}</span><span class="blog-read">${p.read} read</span></div>
      </div></div>`;
  }).join('');
  const pag = document.getElementById('blog-pagination');
  if (!pag) return;
  let html = `<button class="pg-btn" onclick="setBlogPage(${blogPage-1})" ${blogPage===1?'disabled':''}>← Prev</button>`;
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="pg-btn ${i===blogPage?'active':''}" onclick="setBlogPage(${i})">${i}</button>`;
  }
  html += `<button class="pg-btn" onclick="setBlogPage(${blogPage+1})" ${blogPage===totalPages?'disabled':''}>Next →</button>`;
  pag.innerHTML = html;
}
function renderBlogFilters() {
  const c = document.getElementById('blog-filter-btns');
  if (!c) return;
  c.innerHTML = getBlogTags().map(tag =>
    `<button class="filter-btn ${tag===blogFilter?'active':''}" onclick="setBlogFilter('${tag}')">${tag}</button>`
  ).join('');
}
function setBlogPage(n) {
  const total = Math.ceil(getFilteredPosts().length / POSTS_PER_PAGE);
  blogPage = Math.max(1, Math.min(n, total));
  renderBlog();
  document.getElementById('page-blog')?.scrollIntoView({behavior:'smooth',block:'start'});
}
function setBlogFilter(tag) {
  blogFilter = tag; blogPage = 1;
  renderBlogFilters(); renderBlog();
}
renderBlogFilters();
renderBlog();

function openPost(i) {
  const p = posts[i];
  document.getElementById('bp-tag').textContent = p.tag;
  document.getElementById('bp-title').textContent = p.title;
  document.getElementById('bp-meta').textContent = p.date + ' · ' + p.read + ' read';
  document.getElementById('bp-body').innerHTML = p.body;
  document.getElementById('blog-post-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePost() {
  document.getElementById('blog-post-modal').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
